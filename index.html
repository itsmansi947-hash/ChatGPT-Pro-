<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>ChatGPT PRO+ | Official Neural Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10a37f; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body, html { height: 100%; background: var(--bg); color: white; overflow: hidden; }

        /* VIDEO-LIKE PARTICLE BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.6; }

        .wrapper { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100%; }

        .container { width: 90%; max-width: 450px; background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 40px 30px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.7); }

        /* FIXED LOGO */
        .header-logo { width: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary)); animation: glow 3s infinite; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 5px var(--primary)); } 50% { filter: drop-shadow(0 0 20px var(--primary)); } }

        /* SECTIONS */
        #step-2, #step-3 { display: none; }

        h1 { font-size: 26px; font-weight: 900; margin-bottom: 10px; }
        .sub-text { color: #aaa; font-size: 14px; margin-bottom: 25px; }

        /* SELECTION BOX */
        .option-box { background: rgba(255,255,255,0.05); border: 2px solid #333; padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.3s; margin-bottom: 25px; }
        .option-box.active { border-color: var(--primary); background: rgba(16, 163, 127, 0.1); }
        .tick { width: 20px; height: 20px; border: 2px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .active .tick { background: var(--primary); border-color: var(--primary); }
        .active .tick::after { content: 'L'; transform: scaleX(-1) rotate(-35deg); color: white; font-size: 12px; font-weight: bold; }

        .main-btn { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; box-shadow: 0 10px 20px rgba(16, 163, 127, 0.3); }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* PROCESSING */
        .loader-wrap { margin: 30px 0; }
        .progress-bg { width: 100%; height: 8px; background: #222; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary); }
        #log { font-size: 12px; font-family: monospace; color: var(--primary); margin-top: 10px; }

        /* USA PROOFS */
        .proof-box { position: fixed; bottom: 20px; right: 20px; background: white; color: black; padding: 12px 18px; border-radius: 15px; display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: bold; animation: popUp 0.5s ease-out; z-index: 100; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        @keyframes popUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="wrapper">

                    <div class="progress-bg"><div class="progress-fill" id="bar"></div></div>
                    <div id="log">Establishing Neural Link...</div>

            <div id="step-3">

            </div>
        </div>
    </div>

    <div id="proof-container"></div>

    <audio id="tickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script>
        // BACKGROUND PARTICLES (BINDI EFFECT)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        for(let i=0; i<80; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, v: Math.random()*0.5});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#10a37f';
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
                d.y -= d.v; if(d.y < 0) d.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // LOGIC
        let isSelected = false;
        function toggleSelection() {
            isSelected = !isSelected;
            document.getElementById('opt').classList.toggle('active');
            document.getElementById('claimBtn').disabled = !isSelected;
            if(isSelected) document.getElementById('tickSound').play();
        }

        function toStep2() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            
            let w = 0;
            const bar = document.getElementById('bar');
            const log = document.getElementById('log');
            const logs = ["Connecting to OpenAI US-East...", "Verifying UID...", "Injecting GPT-5 Tokens...", "Generating Sora Access...", "Finalizing Credentials..."];
            
            let i = setInterval(() => {
                w += 0.5;
                bar.style.width = w + "%";
                if(w % 20 == 0) log.innerText = logs[Math.floor(w/20)-1];
                if(w >= 100) {
                    clearInterval(i);
                    document.getElementById('step-2').style.display = 'none';
                    document.getElementById('step-3').style.display = 'block';
                }
            }, 30);
        }

        function triggerLocker() {
            if (typeof call_locker === "function") {
                call_locker();
            } else {
                alert("Locker Loading... Please try again in 2 seconds.");
            }
        }

        // USA PROOFS
        const proofs = [
            {n: "Michael R.", l: "California"},
            {n: "Jennifer L.", l: "New York"},
            {n: "Robert D.", l: "Texas"},
            {n: "Emily W.", l: "Florida"},
            {n: "William S.", l: "Chicago"}
        ];

        setInterval(() => {
            const p = proofs[Math.floor(Math.random()*proofs.length)];
            const container = document.getElementById('proof-container');
            container.innerHTML = `
                <div class="proof-box">
                    <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" width="20">
                    <div>${p.n} from ${p.l} just claimed PRO+ Access!</div>
                </div>
            `;
            setTimeout(() => { container.innerHTML = ''; }, 4000);
        }, 9000);
    </script>
